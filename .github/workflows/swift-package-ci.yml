name: Swift Package CI

on:
  workflow_call:
    inputs:
      xcode-version:
        description: 'Xcode version to select (e.g. "16.0"). Defaults to the runner''s latest stable Xcode.'
        required: false
        type: string
        default: 'latest-stable'
      run-tests:
        description: 'Whether to run `swift test` after `swift build`. Set false for packages whose test suite cannot run headless in CI (e.g. embedded xcframework code-signing).'
        required: false
        type: boolean
        default: true
    secrets:
      package-read-token:
        description: 'Optional fine-grained PAT (Contents: Read-only) for cloning private spfk-* dependencies. Only needed by repos that depend on another private repo -- the default GITHUB_TOKEN is scoped only to the repo the workflow runs in.'
        required: false

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure git for private dependency access
        if: ${{ secrets.package-read-token != '' }}
        run: git config --global url."https://x-access-token:${{ secrets.package-read-token }}@github.com/".insteadOf "https://github.com/"

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ inputs.xcode-version }}

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        if: ${{ inputs.run-tests }}
        continue-on-error: true
        run: swift test
