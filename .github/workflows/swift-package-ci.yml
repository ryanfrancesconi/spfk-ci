name: Swift Package CI

on:
  workflow_call:
    inputs:
      xcode-version:
        description: 'Xcode version to select (e.g. "16.0"). Defaults to the runner''s latest stable Xcode.'
        required: false
        type: string
        default: 'latest-stable'
      run-tests:
        description: 'Whether to run `swift test` after `swift build`. Set false for packages whose test suite cannot run headless in CI (e.g. embedded xcframework code-signing).'
        required: false
        type: boolean
        default: true

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ inputs.xcode-version }}

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        if: ${{ inputs.run-tests }}
        continue-on-error: true
        run: swift test
